<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Scratch Launcher</title>

<style>

body {
    font-family: sans-serif;
    margin: 20px;
}

.game {
    padding: 10px;
    margin: 5px;
    border: 1px solid #aaa;
    cursor: pointer;
}

.game:hover {
    background: #eee;
}

.download {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #ddd;
}

.download input {
    width: min(100%, 520px);
    padding: 8px;
    margin-right: 8px;
    box-sizing: border-box;
}

.download button {
    padding: 8px 12px;
    cursor: pointer;
}

.download button:disabled {
    cursor: not-allowed;
    opacity: 0.6;
}

#download-status {
    margin: 10px 0 0;
    min-height: 1.2em;
}

#download-status.error {
    color: #b00020;
}

#download-status.success {
    color: #0a6b0a;
}

</style>

</head>

<body>

<h1>Scratch Launcher</h1>

<div class="download">
    <input
        id="project-url"
        type="text"
        placeholder="Scratch project URL or ID"
    >
    <button id="download-btn" type="button">Download</button>
    <p id="download-status"></p>
</div>

<div id="games"></div>

<script src="launcher.js"></script>

</body>
</html>
